services:
  - type: web
    name: arda-fertilizer
    env: python
    region: frankfurt          # closest to Nigeria; change to ohio if preferred
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile -
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true    # Render auto-generates a secure random value
      - key: PYTHON_VERSION
        value: 3.11.0
